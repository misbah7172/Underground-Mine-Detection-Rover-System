[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; ESP32 serial connection requested for this build
upload_port = COM7
monitor_port = COM7
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bblanchon/ArduinoJson@^6.21.5
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.15

; GPS, LoRa, and old navigator modules are intentionally excluded
build_src_filter =
    +<*>
    -<gps.cpp>
    -<loramodule.cpp>
    -<navigator.cpp>

build_flags =
    -DCORE_DEBUG_LEVEL=0
